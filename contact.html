<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contact | Party Rescue Sydney</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
--bg:#060606;
--line:rgba(255,255,255,.08);
--text:#f5f5f7;
--muted:#b7b7bf;
--red:#df2f2f;
--red2:#ff6b57;
--shadow:0 24px 70px rgba(0,0,0,.45);
--glow:0 24px 70px rgba(223,47,47,.22)
}
*{box-sizing:border-box}
body{
margin:0;
font-family:Inter,Arial,sans-serif;
color:var(--text);
background:linear-gradient(180deg,#040404,#070707,#050505)
}
.wrap{max-width:1200px;margin:auto;padding:20px}
.btn{
padding:14px 20px;
border-radius:16px;
font-weight:800;
background:linear-gradient(135deg,var(--red),var(--red2));
color:#fff;border:none;cursor:pointer
}
.form-box{
padding:24px;
border-radius:24px;
border:1px solid var(--line);
background:#111;
box-shadow:var(--shadow)
}
input,textarea{
width:100%;
padding:14px;
border-radius:14px;
border:1px solid var(--line);
background:#0d0d0f;
color:#fff
}
textarea{min-height:120px}
.split{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.custom-select{position:relative}
.select-btn{
padding:14px;
border-radius:14px;
border:1px solid var(--line);
background:#0d0d0f;
cursor:pointer
}
.select-options{
display:none;
position:absolute;
top:110%;
left:0;
right:0;
background:#111;
border-radius:14px;
border:1px solid var(--line);
z-index:100
}
.option{padding:12px;cursor:pointer}
.option:hover{background:rgba(223,47,47,.2)}
.success-popup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#111;
padding:14px 18px;
border-radius:14px;
opacity:0;
transition:.3s;
border:1px solid var(--line)
}
.success-popup.show{opacity:1}
</style>
</head>

<body>

<div id="successPopup" class="success-popup">Enquiry Sent ✅</div>

<div class="wrap">

<div class="form-box">
<h2>Enquire Now</h2>

<form id="enquiryForm" action="https://formspree.io/f/xlgonevw" method="POST">

<input type="hidden" name="_subject" value="New Party Rescue Enquiry">
<input type="hidden" name="_replyto" id="replyToField">

<label>Contact Name</label>
<input name="name" required>

<div class="split">
<div>
<label>Contact Number</label>
<input name="phone" required>
</div>

<div>
<label>Email Address</label>
<input id="emailAddress" name="email" type="email" required>
</div>
</div>

<div class="split">
<div>
<label>Booking Date</label>
<input type="date" name="date" required>
</div>

<div>
<label>Pickup Time</label>
<input type="time" name="time" required>
</div>
</div>

<label>Pickup Address</label>
<input name="pickup">

<label>Drop-off Address</label>
<input name="dropoff">

<div class="split">
<input name="person" placeholder="Event Person Name">
<input name="occasion" placeholder="Event Occasion">
</div>

<label>Choose Package</label>
<div class="custom-select" id="packageSelect">
<div class="select-btn" id="selectedText">Choose a Package</div>

<div class="select-options">
<div class="option">Birthdays</div>
<div class="option">Hen's Party</div>
<div class="option">VIP Coach Party</div>
<div class="option">Children's Birthday</div>
<div class="option">Airport Transfer</div>
<div class="option">Custom Event Booking</div>
</div>
</div>

<input type="hidden" name="package" id="selectedPackage" required>

<label>
<input type="checkbox" id="termsCheck"> I agree to terms
</label>

<label>Captcha: <span id="captchaText"></span></label>
<input id="captchaInput" type="number">

<textarea name="message" placeholder="Additional comments"></textarea>

<button id="submitBtn" class="btn" disabled>Send Message</button>

</form>
</div>
</div>

<script>
const form = document.getElementById("enquiryForm");
const popup = document.getElementById("successPopup");
const email = document.getElementById("emailAddress");
const reply = document.getElementById("replyToField");
const submit = document.getElementById("submitBtn");
const terms = document.getElementById("termsCheck");
const captchaInput = document.getElementById("captchaInput");
const captchaText = document.getElementById("captchaText");
const hiddenPackage = document.getElementById("selectedPackage");

const select = document.getElementById("packageSelect");
const btn = select.querySelector(".select-btn");
const options = select.querySelector(".select-options");

const a = Math.floor(Math.random()*5)+2;
const b = Math.floor(Math.random()*5)+2;
const answer = a+b;
captchaText.textContent = `${a} + ${b}`;

btn.onclick = () => options.style.display = options.style.display==="block"?"none":"block";

select.querySelectorAll(".option").forEach(o=>{
o.onclick = ()=>{
btn.textContent = o.textContent;
hiddenPackage.value = o.textContent;
options.style.display="none";
check();
}
});

function check(){
const ok = Number(captchaInput.value)===answer && terms.checked && hiddenPackage.value;
submit.disabled = !ok;
}

captchaInput.oninput = check;
terms.onchange = check;

form.addEventListener("submit", async (e)=>{
e.preventDefault();

reply.value = email.value;

const res = await fetch(form.action,{
method:"POST",
body:new FormData(form),
headers:{Accept:"application/json"}
});

if(res.ok){
form.reset();
btn.textContent="Choose a Package";
hiddenPackage.value="";
popup.classList.add("show");
setTimeout(()=>popup.classList.remove("show"),2500);
check();
}else{
alert("Error sending enquiry");
}
});
</script>

</body>
</html>
